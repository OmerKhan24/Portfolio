<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Dark background matching portfolio slate-900 -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Subtle gradient overlay -->
  <rect width="32" height="32" rx="7" fill="url(#g)" opacity="0.12"/>
  <!-- < bracket -->
  <polyline points="9,7 4,16 9,25" stroke="url(#g)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / slash -->
  <line x1="14" y1="25" x2="18" y2="7" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- > bracket -->
  <polyline points="23,7 28,16 23,25" stroke="url(#g)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
